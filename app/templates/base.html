<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AcademiNet{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ range(1,99999) | random }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-icon">🎓</span>
            <span class="brand-name">AcademiNet</span>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Inicio</a></li>
            <li><a href="/usuarios-page" class="nav-link {% if request.url.path == '/usuarios-page' %}active{% endif %}">Usuarios</a></li>
            <li><a href="/publicaciones-page" class="nav-link {% if request.url.path == '/publicaciones-page' %}active{% endif %}">Publicaciones</a></li>
            <li><a href="/fotografias-page" class="nav-link {% if request.url.path == '/fotografias-page' %}active{% endif %}">Fotografías</a></li>
            <li><a href="/admin-page" class="nav-link {% if request.url.path == '/admin-page' %}active{% endif %}">Admin</a></li>
            <li><a href="/docs" class="nav-link nav-docs" target="_blank">API Docs</a></li>
        </ul>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>AcademiNet &copy; 2025 — Universidad de Cuenca — Base de Datos II</p>
    </footer>

    <div id="toast" class="toast hidden"></div>

    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
